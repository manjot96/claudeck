<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="64" fill="url(#glow)"/>
  <!-- Terminal window frame -->
  <rect x="96" y="116" width="320" height="280" rx="32" fill="none" stroke="#3b82f6" stroke-width="8" opacity="0.35"/>
  <!-- Title bar dots -->
  <circle cx="136" cy="152" r="10" fill="#ef4444" opacity="0.65"/>
  <circle cx="172" cy="152" r="10" fill="#eab308" opacity="0.65"/>
  <circle cx="208" cy="152" r="10" fill="#22c55e" opacity="0.65"/>
  <!-- Divider line -->
  <line x1="96" y1="180" x2="416" y2="180" stroke="#334155" stroke-width="3"/>
  <!-- > chevron (prompt symbol) -->
  <polyline points="148,260 188,296 148,332" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor -->
  <line x1="216" y1="330" x2="296" y2="330" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
</svg>
